name: Crypto Oracle 24-Hour Loop

on:
  schedule:
    - cron: '0 */6 * * *'  # Runs every 6 hours
  workflow_dispatch:      # Manual trigger

jobs:
  forecast-scroll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

- name: Fetch investor signals
  run: |
    set -euxo pipefail
    curl -fsS "https://YOUR-REAL-FEED-URL/signal-feed" > signals.json
    test -s signals.json
      - name: 📜 Generate Forecast Scroll
        run: |
          python generate_scroll.py --source signals.json --output forecast.md

      - name: 🚀 Push to BBW Temple
        run: |
          git config user.name "Charles Buchanan"
          git config user.email "charlesanthonybuchanansr@oraclesignal.site"
          git add forecast.md
          git commit -m "🪬 Oracle Forecast Update"
          git push
